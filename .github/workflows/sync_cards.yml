# ==============================================================================
# Automated weekly sync: ETL + embeddings → Neon Postgres
#
# Credentials are stored as GitHub Secrets — never in code.
# To set up: Settings → Secrets → Actions → add DATABASE_URL
# ==============================================================================

name: Sync MTG Cards

on:
  schedule:
    # Every Monday at 06:00 UTC (midnight CST)
    - cron: "0 6 * * 1"
  workflow_dispatch:  # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline (ETL + embeddings)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EMBEDDING_BACKEND: ${{ secrets.EMBEDDING_BACKEND || 'huggingface' }}
          HF_EMBED_MODEL: ${{ secrets.HF_EMBED_MODEL || 'sentence-transformers/all-MiniLM-L6-v2' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          OPENAI_EMBED_MODEL: ${{ secrets.OPENAI_EMBED_MODEL || 'text-embedding-3-small' }}
        run: python -m etl.pipeline
