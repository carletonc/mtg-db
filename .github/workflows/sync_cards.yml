# ==============================================================================
# Automated weekly sync of MTGJson AtomicCards → Neon Postgres
#
# Credentials are stored as GitHub Secrets — never in code.
# To set up: Settings → Secrets → Actions → add DATABASE_URL
# ==============================================================================

name: Sync MTG Cards

on:
  schedule:
    # Every Monday at 06:00 UTC (midnight CST)
    - cron: "0 6 * * 1"
  workflow_dispatch:  # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv

      - name: Run foundation ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m etl.pipeline
